<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Compare</title>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/cities.css" />
</head>

<body>

  <div class="app-wrap">

    <a class="back-link" href="index.html">← Back</a>

    <div class="compare-box">

      <div class="compare-header">
        <div class="icon-brain">🧠</div>
        <h2>Compare Two Cities</h2>
      </div>

      <div class="input-group">

        <div class="input-wrapper">
          <input type="text" id="city1" placeholder="City 1 (e.g Manila)" />
        </div>

        <div class="vs-divider">
          <span>vs</span>
        </div>

        <div class="input-wrapper">
          <input type="text" id="city2" placeholder="City 2 (e.g Pampanga)" />
        </div>

      </div>

  <button class="compare-btn" onclick="compareCities()">
  Compare Cities
</button>
      </button>

      <div id="result"></div>

    </div>
  </div>

  <script src="js/countries.js"></script>

</body>
</html>
